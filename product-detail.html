<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chi tiết sản phẩm - myshoes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <!-- header (same as index) -->
  <header class="top-header">
  <div class="container d-flex align-items-center justify-content-between py-2">
    <div class="brand d-flex align-items-center">
      <img src="assets/logo.jpg" alt="myshoes" class="logo me-3" id="site-logo">
    </div>

    <div class="search-wrap flex-fill mx-4">
      <form class="d-flex" role="search">
        <input class="form-control me-2 search-input" type="search" placeholder="Tìm kiếm sản phẩm..." aria-label="Search">
        <button class="btn btn-search" type="submit"><i class="fa fa-search"></i></button>
      </form>
    </div>

    <div class="header-actions d-flex align-items-center">
      <div id="user-area" class="d-flex align-items-center position-relative">
        <a id="account-link" href="#" class="me-3 text-white header-link"><i class="fa fa-user-circle fa-lg"></i><span id="account-text" class="d-none d-lg-inline ms-1">Tài khoản</span></a>
        <div id="account-menu" class="account-dropdown" style="display:none"></div>
        <a id="logout-link" href="#" class="me-3 text-white header-link d-none">Đăng xuất</a>
      </div>
      <!-- notification button inserted by js/notifications.js -->
      <a href="cart.html" class="position-relative text-white header-link">
        <i class="fa fa-shopping-bag fa-lg"></i>
        <span class="cart-badge">0</span>
      </a>
    </div>
  </div>
  </header>

  <div class="container mt-3">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
        <li class="breadcrumb-item active" id="crumb-name" aria-current="page">Sản phẩm</li>
      </ol>
    </nav>

    <div class="row">
      <div class="col-lg-6">
        <div class="row">
          <div class="col-2">
            <div id="thumbs" class="d-flex flex-column gap-2"></div>
          </div>
          <div class="col-10">
            <div class="product-main-image border" id="main-image" style="min-height:420px;display:flex;align-items:center;justify-content:center;padding:18px;background:#fff">
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <h3 id="pd-name"></h3>
        <div class="mb-2 text-muted" id="pd-brand"></div>
        <div class="d-flex align-items-center mb-3">
          <div class="me-3 h3 text-danger" id="pd-price"></div>
          <div class="text-muted ms-2" id="pd-oldprice" style="text-decoration:line-through"></div>
        </div>
        <div id="pd-meta" class="mb-3">
        </div>
        <div class="mb-3">
          <label class="form-label">Chọn size</label>
          <div id="pd-sizes" class="d-flex gap-2 flex-wrap"></div>
        </div>
        <div class="mb-3 d-flex gap-2">
          <input id="pd-qty" type="number" value="1" min="1" class="form-control" style="max-width:96px">
          <button id="pd-add" class="btn btn-secondary" style="background:var(--secondary);border-color:var(--secondary)"><i class="fa fa-shopping-cart"></i> Thêm vào giỏ</button>
          <button id="pd-buy" class="btn btn-danger"><i class="fa fa-bolt"></i> Mua ngay</button>
        </div>

        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Mô tả chi tiết</h5>
            <div id="pd-detail"></div>
          </div>
        </div>

      </div>
    </div>

    <section class="mt-4 mb-5" id="similar-products-section">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Sản phẩm tương tự</h4>
        <small class="text-muted" id="similar-products-note"></small>
      </div>
      <div id="similar-products" class="row g-3"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cart.js?v=3"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script src="js/notifications.js?v=4"></script>
  <script src="js/product-detail.js?v=8"></script>
  <script src="js/footer-contact.js?v=4"></script>
</body>
</html>
