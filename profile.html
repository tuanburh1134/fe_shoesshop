<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trang cá nhân - myshoes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<!-- Top header (shared) -->
<header class="top-header">
  <div class="container d-flex align-items-center justify-content-between py-2">
    <div class="brand d-flex align-items-center">
      <img src="assets/logo.jpg" alt="myshoes" class="logo me-3" id="site-logo">
    </div>
    <div class="search-wrap flex-fill mx-4">
      <form class="d-flex" role="search">
        <input class="form-control me-2 search-input" type="search" placeholder="Tìm kiếm sản phẩm..." aria-label="Search">
        <button class="btn btn-search" type="submit"><i class="fa fa-search"></i></button>
      </form>
    </div>
    <div class="header-actions d-flex align-items-center">
      <div id="user-area" class="d-flex align-items-center position-relative">
        <a id="account-link" href="#" class="me-3 text-white header-link"><i class="fa fa-user-circle fa-lg"></i><span id="account-text" class="d-none d-lg-inline ms-1">Tài khoản</span></a>
        <div id="account-menu" class="account-dropdown" style="display:none"></div>
        <a id="logout-link" href="#" class="me-3 text-white header-link d-none">Đăng xuất</a>
      </div>
      <!-- notification button inserted by js/notifications.js -->
      <a href="cart.html" class="position-relative text-white header-link">
        <i class="fa fa-shopping-bag fa-lg"></i>
        <span class="cart-badge">0</span>
      </a>
    </div>
  </div>
</header>

<div class="container py-5">
    <div class="row">
      <div class="col-md-8">
        <div class="card mb-3">
          <div class="card-body">
            <h4 class="card-title">Hồ sơ cá nhân</h4>
            <div class="d-flex gap-3 align-items-start">
              <div style="width:160px">
                <div id="avatar-box" class="text-center">
                  <img id="profile-avatar" src="assets/avatar-placeholder.png" onerror="this.onerror=null;this.src='assets/logo.jpg'" alt="avatar" style="width:120px;height:120px;border-radius:60px;object-fit:cover;border:2px solid #eee"/>
                  <div class="mt-2"><input id="avatar-input" type="file" accept="image/*" style="display:none"/><button id="change-avatar" class="btn btn-sm btn-outline-primary">Đổi ảnh</button></div>
                </div>
              </div>
              <div class="flex-fill">
                <p id="profile-username">Tên: -</p>
                <p id="profile-email">Email: -</p>
                <div id="admin-actions" class="mb-2 d-none">
                  <a href="admin/manage-product.html" class="btn btn-sm btn-info me-1">Quản lí hàng hóa</a>
                </div>
                <div class="mt-2">
                  <button id="profile-logout" class="btn btn-outline-secondary">Đăng xuất</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="card mb-3">
          <div class="card-body">
            <h5>Địa chỉ giao hàng</h5>
            <div id="addresses-list"></div>
            <div id="address-form-container" class="mt-3"></div>
            <div class="mt-3">
              <button id="add-address" class="btn btn-sm btn-primary">+ Thêm địa chỉ</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card p-3">
          <h5 class="mb-3">Thống kê mua sắm</h5>
          <div><strong id="total-purchased">0</strong> tổng sản phẩm đã mua</div>
          <div class="mt-3"><small class="text-muted">Ngày bắt đầu mua: <span id="first-purchase">-</span></small></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/product.js"></script>
  <script src="js/cart.js?v=5"></script>
  <script src="js/auth.js?v=4"></script>
  <script src="js/header.js"></script>
  <script src="js/notifications.js?v=4"></script>
  <script src="js/profile.js?v=2"></script>
  <script src="js/footer-contact.js?v=4"></script>
  <script>
    (function(){
      function $(sel){return document.querySelector(sel)}
      try{
        var cur = JSON.parse(localStorage.getItem('currentUser')||'null')
        if(!cur || !cur.username){ window.location.href = 'auth.html'; return }
        // if profile.js loaded it will initialize; otherwise simple fallback
        $('#profile-username').textContent = 'Tên: ' + (cur.username||'')
        $('#profile-email').textContent = 'Email: ' + (cur.email||'-')
        if(cur.role && cur.role === 'admin'){
          document.getElementById('admin-actions').classList.remove('d-none')
        }
      }catch(e){window.location.href='auth.html'}

      var btn = $('#profile-logout')
      if(btn) btn.addEventListener('click', async function(){
        var ok = true
        try{
          if(window.showConfirm) ok = await window.showConfirm('Bạn có chắc muốn đăng xuất không?', 'Xác nhận đăng xuất')
          else ok = confirm('Bạn có chắc muốn đăng xuất không?')
        }catch(err){ ok = confirm('Bạn có chắc muốn đăng xuất không?') }
        if(!ok) return
        localStorage.removeItem('currentUser')
        if(window.showNotification) window.showNotification('Đăng xuất thành công', '', 'success', 1200)
        else alert('Đăng xuất thành công')
        setTimeout(function(){ window.location.href='index.html' }, 300)
      })
    })()
  </script>
</body>
</html>
