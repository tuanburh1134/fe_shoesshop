<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quản lý hóa đơn - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="d-flex admin-layout">
    <aside class="admin-sidebar p-4">
      <div class="mb-4 d-flex align-items-center">
        <img src="../assets/logo.jpg" alt="logo" style="height:40px;border-radius:6px;margin-right:8px">
      </div>
      <ul class="list-unstyled">
        <li class="mb-2"><a href="dashboard.html" class="text-decoration-none"> <i class="fa fa-chart-line me-2"></i> Thống kê doanh thu</a></li>
        <li class="mb-2"><a href="manage-product.html" class="text-decoration-none"> <i class="fa fa-boxes me-2"></i> Quản lý hàng hóa</a></li>
        <li class="mb-2"><a href="manage-users.html" class="text-decoration-none"> <i class="fa fa-users me-2"></i> Quản lý tài khoản</a></li>
        <li class="mb-2"><a href="manage-orders.html" class="text-decoration-none"> <i class="fa fa-receipt me-2"></i> Quản lý hóa đơn</a></li>
        <li class="mb-2"><a href="#" class="text-decoration-none"> <i class="fa fa-cog me-2"></i> Cài đặt</a></li>
        <li class="mt-4"><a href="../index.html" class="btn btn-outline-secondary btn-sm">Trở về trang chủ</a></li>
      </ul>
    </aside>

    <main class="flex-fill p-4 admin-main">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Quản lý hóa đơn</h3>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <input id="orders-search" class="form-control" placeholder="Tìm theo mã đơn hoặc người đặt..." style="min-width:300px">
            </div>
            <div>
              <select id="filter-status" class="form-select">
                <option value="all">Tất cả</option>
                <option value="pending">Chờ xác nhận</option>
                <option value="approved">Đang chuẩn bị</option>
                <option value="cancelled">Đã hủy</option>
              </select>
            </div>
          </div>

          <div id="orders-list" class="list-group"></div>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js?v=3"></script>
  <script src="../js/auth.js?v=3"></script>
  <script src="../js/notifications.js?v=5"></script>
  <script src="../js/admin-manage-orders.js?v=3"></script>
  <script src="../js/footer-contact.js?v=4"></script>
</body>
</html>
