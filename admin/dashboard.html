<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trang quản lí - myshoes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="d-flex admin-layout">
    <aside class="admin-sidebar p-4">
      <div class="mb-4 d-flex align-items-center">
        <a href="../index.html" aria-label="Về trang chủ">
          <img src="../assets/logo.jpg" alt="logo" style="height:40px;border-radius:6px;margin-right:8px">
        </a>
      </div>
      <ul class="list-unstyled">
        <li class="mb-2"><a href="dashboard.html" class="text-decoration-none"> <i class="fa fa-chart-line me-2"></i> Thống kê doanh thu</a></li>
        <li class="mb-2"><a href="manage-product.html" class="text-decoration-none"> <i class="fa fa-boxes me-2"></i> Quản lý hàng hóa</a></li>
        <li class="mb-2"><a href="manage-users.html" class="text-decoration-none"> <i class="fa fa-users me-2"></i> Quản lý tài khoản</a></li>
        <li class="mb-2"><a href="manage-orders.html" class="text-decoration-none"> <i class="fa fa-receipt me-2"></i> Quản lý hóa đơn</a></li>
        <li class="mt-4"><a href="../index.html" class="btn btn-outline-secondary btn-sm">Trở về trang chủ</a></li>
      </ul>
    </aside>

    <main class="flex-fill p-4 admin-main">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Trang quản lí</h3>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-12 col-md-6 d-flex">
          <div class="card p-3 bg-info text-white w-100 h-100">
            <div class="small">Doanh thu tháng hiện tại</div>
            <div class="h3 mb-0" id="monthly-revenue-value">0 đ</div>
          </div>
        </div>
        <div class="col-12 col-md-6 d-flex">
          <div class="card p-3 w-100 h-100" id="monthly-diff-card">
            <div class="small text-muted">Lãi/Lỗ so với tháng trước</div>
            <div class="h3 mb-0" id="monthly-diff-value">0 đ</div>
            <div class="small mt-1" id="monthly-diff-note"></div>
          </div>
        </div>
      </div>

      <div class="card mb-4 p-3">
        <h5>Biểu đồ doanh thu theo tháng - <span id="revenue-year-label"></span></h5>
        <div id="year-revenue-chart"></div>
      </div>

      <div class="card p-3">
        <h5>Top 10 giày bán chạy nhất</h5>
        <table class="table table-hover mt-3">
          <thead>
            <tr>
              <th>Hạng</th>
              <th>Tên giày</th>
              <th>Số lượng bán</th>
              <th>Doanh thu</th>
            </tr>
          </thead>
          <tbody id="top-products-body"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js?v=4"></script>
  <script src="../js/admin-dashboard.js?v=3"></script>
  <script src="../js/footer-contact.js?v=4"></script>
</body>
</html>
