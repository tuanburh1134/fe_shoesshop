<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập / Đăng ký - myshoes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-dark text-dark">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="auth-wrap bg-white p-4 shadow-sm">
          <div class="row">
            <div class="col-md-6 border-end">
              <h5 class="mb-3">Đăng nhập</h5>
              <form id="login-form">
                <div class="mb-3">
                  <label class="form-label">Tên đăng nhập :</label>
                  <input id="login-username" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Mật khẩu :</label>
                  <input id="login-password" type="password" class="form-control" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Đăng nhập</button>
                <div class="text-center mt-3 small">Chưa có tài khoản ? <a href="#" id="show-register">Đăng ký</a></div>
              </form>
            </div>
            <div class="col-md-6">
              <h5 class="mb-3">Đăng ký</h5>
              <form id="register-form">
                <div class="mb-3">
                  <label class="form-label">Tên đăng nhập :</label>
                  <input id="reg-username" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Mật khẩu :</label>
                  <input id="reg-password" type="password" class="form-control" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Đăng ký</button>
                <div class="text-center mt-3 small">Đã có tài khoản ? <a href="#" id="show-login">Đăng nhập</a></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/footer-contact.js?v=4"></script>
</body>
</html>
